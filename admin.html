<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霄一交易站 数据同步管理后台</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#060a18;color:#e6edf7;}
        .admin-header{background:#0b1229;padding:22px 40px;border-bottom:1px solid #2563eb;}
        .admin-header h1{color:#38bdf8;font-size:26px;}
        .admin-container{display:flex;}
        .admin-sidebar{width:220px;background:#0a1022;height:100vh;position:fixed;padding-top:30px;}
        .admin-sidebar a{display:block;color:#cbd5e1;text-decoration:none;padding:16px 30px;font-size:16px;}
        .admin-sidebar a:hover{background:#15224b;color:#a855f7;}
        .admin-sidebar a.active{background:#1e3a8a;color:#38bdf8;}
        .admin-main{margin-left:220px;padding:40px;}
        .admin-card{background:#0f172a;padding:28px;border-radius:8px;border:1px solid #1e293b;margin-bottom:25px;}
        .admin-card h2{color:#38bdf8;margin-bottom:15px;}
        input,select,textarea{width:100%;padding:11px;background:#111827;border:1px solid #2563eb;color:#fff;border-radius:5px;margin:8px 0;outline:none;}
        .btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;margin:0 2px;}
        .btn-blue{background:#2563eb;color:#fff;}
        .btn-purple{background:#a855f7;color:#fff;}
        .btn-orange{background:#f97316;color:#fff;}
        .btn-red{background:#ef4444;color:#fff;}
        table{width:100%;border-collapse:collapse;margin-top:15px;}
        th,td{border:1px solid #1e293b;padding:12px;text-align:center;font-size:14px;}
        th{background:#15224b;color:#38bdf8;}
        .edit-pop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);}
        .edit-box{width:450px;margin:100px auto;background:#0f172a;padding:30px;border-radius:8px;border:1px solid #a855f7;}
    </style>
</head>
<body>
<div class="admin-header">
    <h1>霄一交易站 · 数据实时同步后台</h1>
</div>
<div class="admin-container">
    <div class="admin-sidebar">
        <a href="#data">数据总览</a>
        <a href="#addGoods">商品上架</a>
        <a href="#goodsList" class="active">商品管理</a>
        <a href="#order">订单管理</a>
        <a href="#user">用户管理</a>
        <a href="login.html">退出登录</a>
    </div>

    <div class="admin-main">
        <div id="data" class="admin-card">
            <h2>平台数据总览</h2>
            <p>在售商品数量：<span id="saleCount">0</span> 件</p>
        </div>

        <div id="addGoods" class="admin-card">
            <h2>新增商品上架</h2>
            <select id="addType">
                <option>战甲专区</option>
                <option>武器专区</option>
                <option>紫卡专区</option>
                <option>MOD遗物专区</option>
                <option>白金专区</option>
                <option>材料专区</option>
                <option>阿耶精华专区</option>
            </select>
            <input type="text" id="addName" placeholder="商品名称">
            <input type="text" id="addPrice" placeholder="商品价格">
            <input type="text" id="addSeller" placeholder="卖家昵称">
            <textarea id="addDesc" placeholder="商品简介"></textarea>
            <button class="btn btn-blue" onclick="addNewGoods()">确认上架</button>
        </div>

        <div id="goodsList" class="admin-card">
            <h2>商品列表实时管理</h2>
            <table id="goodsTable">
                <tr>
                    <th>ID</th>
                    <th>专区</th>
                    <th>名称</th>
                    <th>价格</th>
                    <th>卖家</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </table>
        </div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="edit-pop" id="editPop">
    <div class="edit-box">
        <h2>编辑商品信息</h2>
        <input type="hidden" id="nowEditId">
        <select id="editType"></select>
        <input type="text" id="editName" placeholder="商品名称">
        <input type="text" id="editPrice" placeholder="商品价格">
        <input type="text" id="editSeller" placeholder="卖家">
        <button class="btn btn-blue" onclick="saveEdit()">保存修改</button>
        <button class="btn btn-red" onclick="closeEdit()">取消</button>
    </div>
</div>

<script src="script.js"></script>
<script>
// 页面加载渲染商品列表
function renderTable(){
    let tb = document.getElementById("goodsTable");
    let count = 0;
    let html = '<tr><th>ID</th><th>专区</th><th>名称</th><th>价格</th><th>卖家</th><th>状态</th><th>操作</th></tr>';
    for(let i=0;i<goodsList.length;i++){
        let g = goodsList[i];
        if(g.status === "onsale") count++;
        html += `<tr>
            <td>${g.id}</td>
            <td>${g.type}</td>
            <td>${g.name}</td>
            <td>${g.price}</td>
            <td>${g.seller}</td>
            <td>${getStatusText(g.status)}</td>
            <td>
                <button class="btn btn-purple" onclick="openEdit(${g.id})">编辑</button>
                <button class="btn btn-orange" onclick="changeStatus(${g.id},'down')">下架</button>
                <button class="btn btn-red" onclick="delGoods(${g.id})">删除</button>
            </td>
        </tr>`;
    }
    tb.innerHTML = html;
    document.getElementById("saleCount").innerText = count;
}

// 打开编辑
function openEdit(id){
    let idx = goodsList.findIndex(item=>item.id===id);
    if(idx < 0) return;
    let g = goodsList[idx];
    document.getElementById("nowEditId").value = id;
    document.getElementById("editType").innerHTML = `<option>${g.type}</option>
        <option>战甲专区</option><option>武器专区</option><option>紫卡专区</option>
        <option>MOD遗物专区</option><option>阿耶精华专区</option>`;
    document.getElementById("editName").value = g.name;
    document.getElementById("editPrice").value = g.price;
    document.getElementById("editSeller").value = g.seller;
    document.getElementById("editPop").style.display = "block";
}

// 关闭编辑
function closeEdit(){
    document.getElementById("editPop").style.display = "none";
}

// 保存修改 全局同步
function saveEdit(){
    let id = parseInt(document.getElementById("nowEditId").value);
    let idx = goodsList.findIndex(item=>item.id===id);
    goodsList[idx].type = document.getElementById("editType").value;
    goodsList[idx].name = document.getElementById("editName").value;
    goodsList[idx].price = document.getElementById("editPrice").value;
    goodsList[idx].seller = document.getElementById("editSeller").value;
    closeEdit();
    renderTable();
    alert("修改成功！前台刷新立即同步");
}

// 下架 / 重新上架
function changeStatus(id,st){
    let idx = goodsList.findIndex(item=>item.id===id);
    if(st === "down"){
        if(!confirm("确定下架？前台不再展示")) return;
        goodsList[idx].status = "down";
        alert("下架成功");
    }else{
        goodsList[idx].status = "onsale";
        alert("重新上架成功");
    }
    renderTable();
}

// 删除商品 彻底移除
function delGoods(id){
    if(!confirm("删除后无法恢复，确定删除？")) return;
    goodsList = goodsList.filter(item=>item.id !== id);
    renderTable();
    alert("删除成功，前台同步消失");
}

// 新增商品
function addNewGoods(){
    let newId = Date.now();
    let obj = {
        id: newId,
        type: document.getElementById("addType").value,
        name: document.getElementById("addName").value,
        price: document.getElementById("addPrice").value,
        seller: document.getElementById("addSeller").value,
        desc: document.getElementById("addDesc").value,
        status: "onsale"
    };
    goodsList.push(obj);
    renderTable();
    alert("商品上架成功，前台同步展示");
}

window.onload = renderTable;
</script>
</body>
</html>
