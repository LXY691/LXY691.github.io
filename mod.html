</head>
<body>
<header class="header">
    <div class="container">
        <div class="logo">霄一交易平台</div>
        <nav class="nav">
            <a href="index.html">首页</a>
            <a href="warframe.html">战甲交易</a>
            <a href="weapon.html">武器交易</a>

            <a href="login.html">后台管理</a>
        </nav>
    </div>
</header>

<div class="container wrap">
    <h2 class="page-title">MOD&重生核桃&遗物专区</h2>
    <div id="listBox"></div>
</div>

<footer class="footer">
    <p>霄一交易平台 · MOD遗物专业安全交易专区</p>
</footer>

<script src="script.js"></script>
<script>
function renderData(){
    let html = "";
    let data = goodsList.filter(v=>v.type=="MOD遗物专区"&&v.status=="onsale");
    data.forEach(item=>{
        html += `
        <div class="wf-card">
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
            <p class="price-text">售价：${item.price}</p>
            <p>卖家：${item.seller}</p>
            <button class="share-btn" onclick="createGoodsShareImg('${item.name}','${item.price}','${item.desc}')">一键分享出图</button>
        </div>
        `;
    });
    document.getElementById("listBox").innerHTML = html;
}
window.onload = renderData;
</script>
</body>
</html>
