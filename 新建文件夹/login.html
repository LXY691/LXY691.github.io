<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 霄一交易平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#060a18;font-family:微软雅黑;}
        .login-box{width:400px;margin:120px auto;background:#0f172a;padding:40px;border-radius:10px;border:1px solid #a855f7;}
        h2{text-align:center;color:#38bdf8;margin-bottom:30px;}
        input{width:100%;padding:12px;margin:10px 0;background:#111827;border:1px solid #2563eb;color:#fff;border-radius:5px;outline:none;}
        button{width:100%;padding:12px;background:#a855f7;border:none;color:#fff;font-size:16px;border-radius:5px;cursor:pointer;margin-top:10px;}
        .err{color:red;text-align:center;margin-top:15px;display:none;}
    </style>
</head>
<body>
<div class="login-box">
    <h2>霄一交易平台 后台登录</h2>
    <input type="text" id="user" placeholder="管理员账号">
    <input type="password" id="pwd" placeholder="登录密码">
    <div class="err" id="errTip">账号或密码错误</div>
    <button onclick="login()">立即登录</button>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pwd").value;
    if(u=="admin" && p=="admin123"){
        location.href="admin.html";
    }else{
        document.getElementById("errTip").style.display="block";
    }
}
</script>
</body>
</html>
